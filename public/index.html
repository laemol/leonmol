<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>leonmol.nl</title>

  <style>
    :root {
      --bg: #0f1115;
      --text: #f5f5f5;
      --muted: #8b8f98;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;

      background:
        radial-gradient(circle at top, #202638 0%, transparent 40%),
        var(--bg);

      color: var(--text);

      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    main {
      text-align: center;
      padding: 40px;
    }

    .label {
      margin-bottom: 16px;

      color: var(--muted);

      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 13px;
    }

    .counter {
      font-size: clamp(90px, 18vw, 220px);
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    h1 {
      margin: 18px 0 12px;

      font-size: clamp(28px, 5vw, 58px);
      font-weight: 700;

      letter-spacing: -0.05em;
    }

    p {
      margin: 0;

      color: var(--muted);

      font-size: 18px;
      line-height: 1.6;
    }

    footer {
      position: fixed;
      bottom: 24px;

      color: var(--muted);

      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .fade-in {
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <main class="fade-in">
    <div class="label">live statistiek</div>

    <div class="counter" id="counter">...</div>

    <h1>bezoekers teleurgesteld</h1>

    <p id="subtitle"></p>
  </main>

  <script>
    const subtitles = [
      'en toch blijft u kijken',
      'de verwachtingen waren te hoog',
      'dit is inderdaad de hele website',
      'u krijgt geen geld terug',
      'mogelijk wordt dit later nog erger',
      'bedankt voor uw bijdrage',
      'geen cookies. wel teleurstelling.',
    ]

    document.getElementById('subtitle').textContent =
      subtitles[Math.floor(Math.random() * subtitles.length)]

    async function updateCounter() {
      const counterElement = document.getElementById('counter')

      try {
        const response = await fetch('counter.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
        })

        if (!response.ok) {
          throw new Error('Counter kon niet worden bijgewerkt')
        }

        const { value } = await response.json()

        counterElement.textContent = Number(value).toLocaleString('nl-NL')
      } catch {
        counterElement.textContent = 'n.v.t.'
      }
    }

    updateCounter()
  </script>

</body>
</html>
